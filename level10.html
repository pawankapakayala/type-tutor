            <div class="key home-key-1" id="f" data-char="F">F</div>
            <div class="key--letter-4" id="g" data-char="G">G</div>
            <div class="key--letter-5" id="h" data-char="H">H</div>
            <div class="key home-key-2" id="j" data-char="J">J</div>
            <div class="key--letter-3" id="k" data-char="K">K</div>
            <div class="key--letter-2" id="l" data-char="L">L</div>
            <div class="key--double-1" id="key-semicolon" data-key="186" data-char=":;">

            <div class="key--double-2" data-key="188" data-char=" ">

            </div>
            <div class="key--double-3" data-key="190" data-char=" ">

              <div>/</div>
            </div>
            <div class="key--bottom-right key--word key--w6" data-key="16-R">
              <span>Shift</span>
            </div>
          </div>
          <div class="keyboard__row keyboard__row--h3">
            <div class="key--bottom-left key--word" data-key="17">
              <span>Ctrl</span>
            </div>
            <div class="key--bottom-left key--word key--w1">
              <span>Fn</span>
            </div>
            <div class="key windows-key">
              <img src="./assets/windows-logo.png" alt="windows-key" class="win-logo">
            </div>
            <div class="key--bottom-right key--word key--w3" data-key="18">
              <span>Alt</span>
            </div>
            <div
              class="key--double key--right key--space"

              data-char=" ">

            </div>
            <div class="key--bottom-left key--word key--w3" data-key="18-R">
              <span>Alt</span>
            </div>
            <div class="key--bottom-left key--word key--w1" data-key="93-R">
              <span>Home</span>
            </div>

              <span>◀</span>
            </div>
            <div class="key--double key--arrow--tall" data-key="38">
              <div>▲</div>
              <div>▼</div>
            </div>
            <div data-key="39" class="key--arrow">
              <span>▶</span>
            </div>

      <div class="lower">
        <div><img class="lefthand-img flip" id="lh-hand" src="./assets/r1.png" /></div>
        <div class="lowmid">
          <p id="message">Press the correct keys!</p>
          <p id="text-display">
            <span id="textToType">Type</span>
          </p>
          <div id="timer">Timer : 00:00</div>
        </div>
        <div><img class="right-hand-img" id="rh-hand" src="./assets/r1.png" /></div>
      </div>
      <div class="volume">
        <button class="vol-btn" onclick="toggleVoice()">
          <img class="vol-img" src="./assets/mute.png" alt="Volume Icon" />
        </button>
      </div>
      <p id="voiceToggle">Sound : OFF</p>
      <audio id="audioPlayer">
        <source src="./assets/applaud.mp3" type="audio/mpeg">
      </audio>

    <div>
      <div class="hidden blur" id="blur-overlay"></div>
      <div><img class="hidden mascot" id="mascot-img" src="./assets/Picture1.png" alt="Mascot" /></div>
      <div class="hidden congrats-text" id="congrats-text"></div>
      <a href="hh.html" class="hidden btn restart-btn" id="restart-btn">      
        <!-- here u have u use level 4 , but for now i am using hh.html -->

        <span>Restart</span>
      </a>
      <a href="level10.html" class="hidden btn next-btn" id="next-btn">
        <span>Next</span>
      </a>
    </div>
    <button id="switch" tabindex="-1" >Switch Theme</button>

    <script>
      const theme = document.getElementById('theme');
      const btn = document.getElementById('switch');
      let mode = 'tc';

      btn.onclick = () => {
        mode = mode === 'tc' ? 'tc' : 'tc';
        theme.href = 'css/'+ mode + '.css';
        btn.blur();
      };

      const keys = document.querySelectorAll('.key');

      document.addEventListener('keydown', e => {
        const key = document.querySelector(`.key[data-key="${e.key.toLowerCase()}"]`);
        if (key) key.classList.add('active');
      });

      document.addEventListener('keyup', e => {
        const key = document.querySelector(`.key[data-key="${e.key.toLowerCase()}"]`);
        if (key) key.classList.remove('active');
      });
    </script>
    <script src="./script/script10.js"></script>
  </body>
</html>
