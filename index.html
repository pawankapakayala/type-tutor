<!DOCTYPE html>
<html lang="en">
<head>
<script src="js/config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <title>Typing Tutor</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- ================= BACKGROUND ================= -->
<div class="sky-gradient"></div>

<!-- ================= CLOUDS ================= -->

<!-- REPLACE WITH YOUR CLOUD PNG -->
<!-- ================= CLOUDS ================= -->

<img class="cloud cloud1" src="assets/images/clouds1.png">
<img class="cloud cloud3" src="assets/images/clouds3.png">

<img class="cloud cloud2" src="assets/images/clouds2.png">
<img class="cloud cloud4" src="assets/images/clouds4.png">

<!-- ================= HEADER ================= -->

<header class="top-header">

  <img src="assets/images/ie.png" class="header-logo left-logo">

  <div class="header-title">
      <h1>Sri Sathya Sai Vidya Vahini</h1>
      <p>INCLUSIVE EDUCATION</p>
  </div>

  <img src="assets/images/vv.png" class="header-logo right-logo">

</header>

<!-- ================= MAIN GAME CARD ================= -->

<!-- ================= MAIN GAME CARD ================= -->
<section class="game-card">

  <!-- CSS clouds inside card -->
  <div class="cloud" style="width:90px;height:28px;top:6%;left:-8%;--cd:7s;">
    <div style="position:absolute;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.55);top:-18px;left:14px;"></div>
    <div style="position:absolute;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.55);top:-10px;left:40px;"></div>
  </div>
  <div class="cloud" style="width:70px;height:22px;top:8%;right:-4%;--cd:9s;">
    <div style="position:absolute;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.55);top:-14px;left:10px;"></div>
    <div style="position:absolute;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.55);top:-8px;left:30px;"></div>
  </div>

  <!-- Twinkling stars -->
  <span class="star" style="--tx:8%; --ty:18%;--fs:0.85rem;--td:2.8s;--dl:0.0s">✦</span>
  <span class="star" style="--tx:88%;--ty:14%;--fs:1.0rem; --td:3.2s;--dl:0.6s">✦</span>
  <span class="star" style="--tx:5%; --ty:72%;--fs:0.75rem;--td:2.5s;--dl:1.1s">✦</span>
  <span class="star" style="--tx:91%;--ty:68%;--fs:0.90rem;--td:3.0s;--dl:0.3s">✦</span>
  <span class="star" style="--tx:50%;--ty:5%; --fs:0.70rem;--td:2.7s;--dl:0.9s">✦</span>
  <span class="star" style="--tx:78%;--ty:42%;--fs:0.65rem;--td:3.4s;--dl:1.5s">✦</span>
  <span class="star" style="--tx:18%;--ty:55%;--fs:0.72rem;--td:2.9s;--dl:0.4s">✦</span>

  <!-- Title -->
  <h2 class="game-title">Typing Tutor</h2>

  <!-- Subtitle -->
  <p class="subtitle">Learn typing with fun!</p>

  <!-- Start Game button -->
  <button class="start-btn" onclick="openLevels()">
    <span class="spark-l">✦</span>
    Start Game
    <span class="spark-r">✦</span>
  </button>

</section>

<!-- FLOATING ELEMENTS -->
<div class="floating-elements">
  <span class="bubble"></span>
  <span class="bubble"></span>
  <span class="bubble"></span>
  <span class="bubble"></span>
  <span class="bubble"></span>
</div> 

<!-- ================= MASCOTS ================= -->

<!-- GIRL CHARACTER -->
<img id="mascot-right" class="mascot mascot-right"
src="assets/images/shanti.png">

<!-- BOY CHARACTER -->
<img id="mascot-left" class="mascot mascot-left"
src="assets/images/prem.png">


<!-- ================= KEYBOARD ================= -->
<div class="keyboard-area">

    <!-- Glow element – sits behind everything -->
    <div class="keyboard-glow"></div>
    
<img class="keyboard-img" src="assets/images/keyboard.png">

<img class="hand hand-left" src="assets/images/lefthand.png">

<img class="hand hand-right" src="assets/images/righthand.png">

</div>

</body>
<audio id="backgroundMusic" src=assets/audio/bgm.mp3" loop></audio>

<script src="legacy/indexscript.js"></script>
<script src="utils/music.js"></script>

</body>
</html>
