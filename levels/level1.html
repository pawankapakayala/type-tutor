          <div class="key--letter-3" id="k" data-char="K">K</div>
          <div class="key--letter-2" id="l" data-char="L">L</div>

          <div class="key--double-1"><div>:</div><div>;</div></div>

          <div class="key--letter-4" id="b" data-char="B">B</div>

          <div class="key--letter-5" id="m" data-char="M">M</div>

        <div class="keyboard__row keyboard__row--h3">

          <div class="key--double key--arrow--tall">
            <div>&#9650;</div>
            <div>&#9660;</div>
          </div>

          <div class="key--arrow"><span>&#9654;</span></div>

        </div>

      </div>

    </div>


    <div class="lower">

      <div>
        <img class="lefthand flip lh" src="../../assets/images/r.png">
      </div>

      <div class="lowmid">

        <p id="keysToType"><span id="keysToTypeSpan">F</span></p>

    <a href="./level1.html" class="hidden but restart"><span>Restart</span></a>
    <a href="./level2.html" class="hidden but next"><span>Next</span></a>

  </div>


  <button id="switch" tabindex="-1">Switch Theme</button>


  <script>

    const theme = document.getElementById('theme');
    const btn = document.getElementById('switch');

    let mode = 'color';

    btn.onclick = () => {
      mode = mode === 'color' ? 'black' : 'color';
      theme.href = '../css/' + mode + '.css';
      btn.blur();
    };


    const keys = document.querySelectorAll('.key');

    document.addEventListener('keydown', e => {
      const key = document.querySelector(`.key[data-key="${e.key.toLowerCase()}"]`);
      if (key) key.classList.add('active');
    });

    document.addEventListener('keyup', e => {
      const key = document.querySelector(`.key[data-key="${e.key.toLowerCase()}"]`);
      if (key) key.classList.remove('active');
    });

  </script>


  <script src="../legacy/script1.js"></script>
  <script src="../../utils/music.js"></script>

  <audio id="backgroundMusic" src="../../assets/audio/bgm.mp3" loop></audio>
